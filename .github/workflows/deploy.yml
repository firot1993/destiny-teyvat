name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate prompt eval config
        run: npm run eval:prompts:validate

      - name: Run prompt contract evals
        run: npm run eval:prompts

      - name: Build
        run: npm run build
