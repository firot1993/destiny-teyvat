description: Teyvat live adventure quality comparison

prompts:
  - "{{scenarioId}}"

providers:
  - id: file://evals/promptfoo/apiGenerateTarget.ts
    label: openrouter-claude-sonnet
    config:
      provider: openrouter
      model: anthropic/claude-sonnet-4.6
      maxTokens: 1500
      temperature: 0.9

  - id: file://evals/promptfoo/apiGenerateTarget.ts
    label: deepseek-v4-flash
    config:
      provider: deepseek
      model: deepseek-v4-flash
      maxTokens: 1500
      temperature: 0.9

  - id: file://evals/promptfoo/apiGenerateTarget.ts
    label: xai-grok-fast-reasoning
    config:
      provider: xai
      model: grok-4-1-fast-reasoning
      maxTokens: 1500
      temperature: 0.9

commandLineOptions:
  maxConcurrency: 1
  share: false
  table: true

defaultTest:
  assert:
    - type: javascript
      value: file://evals/promptfoo/assertAdventureQuality.cjs

tests:
  - description: storm-wanderer reveal quality
    vars:
      scenarioId: storm-wanderer

  - description: mist-guardian reveal quality
    vars:
      scenarioId: mist-guardian

  - description: silence-scholar reveal quality
    vars:
      scenarioId: silence-scholar
