description: Teyvat prompt contract evals

prompts:
  - "{{scenario}}"

providers:
  - id: file://evals/promptfoo/teyvatPromptProvider.ts
    label: teyvat-prompt-builder

commandLineOptions:
  maxConcurrency: 1
  share: false
  table: true

tests:
  - description: reveal prompt contains character schema and constraints
    vars:
      scenario: reveal
      lang: zh
      framing: protagonist
      required: |
        character reveal
        Teyvat
        Genshin Impact
        vision
        nation
        weapon
        archetype
        bio
        visionStory
        constellation
        signature
        knownAssociate
        Return JSON only
      forbidden: |
        Big Five
        personality test
        questionnaire
        openness
        conscientiousness
    assert:
      - type: javascript
        value: file://evals/promptfoo/assertPromptContract.cjs

  - description: reveal prompt includes mapping hints
    vars:
      scenario: reveal
      lang: zh
      framing: companion
      required: |
        Soft mapping hints
        Framing: companion
        canonical Genshin character
      forbidden: |
        personality
        Big Five
    assert:
      - type: javascript
        value: file://evals/promptfoo/assertPromptContract.cjs

  - description: scene prompt contains tagged structure and pacing
    vars:
      scenario: scene
      lang: zh
      sceneNumber: 2
      previousChoice: follow the voice
      required: |
        scene 2
        interactive Teyvat adventure
        Genshin Impact
        <scene>
        </scene>
        <choices>
        </choices>
        <closing>
        </closing>
        <summary>
        </summary>
        Pacing for this scene
        Story so far
      forbidden: |
        personality
        Big Five
        questionnaire
    assert:
      - type: javascript
        value: file://evals/promptfoo/assertPromptContract.cjs

  - description: scene prompt includes character detail
    vars:
      scenario: scene
      lang: zh
      sceneNumber: 3
      required: |
        Name: Yuna
        Vision: Cryo
        Nation: Inazuma
        Weapon: polearm
        Archetype: Wandering Cartographer
      forbidden: |
        personality test
    assert:
      - type: javascript
        value: file://evals/promptfoo/assertPromptContract.cjs

  - description: late scene prompt enforces closing pressure
    vars:
      scenario: scene
      lang: zh
      sceneNumber: 7
      required: |
        closing must be true
        Land the plane
      forbidden: |
        closing must be false
    assert:
      - type: javascript
        value: file://evals/promptfoo/assertPromptContract.cjs
